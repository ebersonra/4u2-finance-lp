[build]
  command = "npm run build"
  publish = "dist"

# Proxy da API para evitar CORS no browser (reescreve /api/* → bargainly)
[[redirects]]
  from   = "/api/*"
  to     = "https://app.bargainly.com.br/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
